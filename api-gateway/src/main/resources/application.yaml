server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: zone-service
              uri: lb://zone-service
              predicates:
                - Path=/api/zones/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka